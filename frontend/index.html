<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to pharmDB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="loading-state">
        <div class="spinner"></div>
        <div id="loading-text">Syncing with Core Database...</div>
    </div>

    <div class="container" id="dashboard-content">
        
        <div class="header">
            <h1>pharmDB</h1>
        </div>

        <div id="live-datetime" style="font-size: 14px; font-weight: 500; color: #666; text-align: right; padding: 10px;">
            Loading time...
        </div>

        <div class="search-wrapper">
            <div class="search-container">
                <input type="text" id="search-box" class="search-input" placeholder="Search by brand, API, class, or indication...">
            </div>
            
            <div id="autocomplete-dropdown"></div>
            
            <div id="recent-searches-container"></div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-num" id="stat-inventory">0</div>
                <div class="stat-label">Formulations</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="stat-molecules">0</div>
                <div class="stat-label">Unique APIs</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="stat-manufacturers">0</div>
                <div class="stat-label">Manufacturers</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="stat-classes">0</div>
                <div class="stat-label">Pharmacological Classes</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="stat-brands">0</div>
                <div class="stat-label">Brands</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="stat-forms">0</div>
                <div class="stat-label">Dosage Forms</div>
            </div>
        </div>

        <div id="search-results">
            <table>
                <thead>
                    <tr>
                        <th>Brand</th>
                        <th>Variant</th>
                        <th>Strength</th>
                        <th>Form</th>
                        <th>Manufacturer</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                </tbody>
            </table>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modal-details"></div>
        </div>
    </div>
    
    <button id="btn-reset-key" style="position: absolute; top: 10px; right: 10px; font-size: 12px; padding: 4px 8px; opacity: 0.6; cursor: pointer;">Reset Key</button>

    <script type="module" src="js/app.js"></script>
</body>
</html>
